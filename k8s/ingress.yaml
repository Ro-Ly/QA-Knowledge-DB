apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qa-kb-ingress
  namespace: qa-kb
spec:
  rules:
    - host: qa-kb.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80