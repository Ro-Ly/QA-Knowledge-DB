version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: qa-kb-backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: qa-kb-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend